name: Validate Domain Files

on:
  pull_request:
    paths:
      - "domains/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate JSON Schema

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run validator
        run: node util/validate.js
